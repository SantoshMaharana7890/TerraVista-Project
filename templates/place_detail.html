<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ place_name }} - TerraVista</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; line-height: 1.6; }
        
        .navbar { background-color: #0f172a; padding: 15px 60px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .logo { font-size: 1.6rem; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 8px; color: #f8fafc; }
        
        .detail-container { max-width: 900px; margin: 120px auto 60px auto; background: #ffffff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        
        .hero-banner { width: 100%; height: 400px; background: #e2e8f0; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; flex-direction: column; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; opacity: 0; }
        .hero-img.loaded { opacity: 1; }
        
        .content-body { padding: 50px; }
        .place-title { font-size: 2.8rem; color: #0f172a; margin-bottom: 20px; border-bottom: 3px solid #3b82f6; display: inline-block; padding-bottom: 10px; }
        
        .wiki-content { font-size: 1.15rem; color: #334155; line-height: 1.8; margin-bottom: 30px; }
        .wiki-content p { margin-bottom: 15px; }
        
        .loader { text-align: center; padding: 50px; font-size: 1.2rem; color: #64748b; position: absolute; }
        
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .back-btn, .wiki-btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 25px; border-radius: 8px; font-weight: 700; text-decoration: none; transition: 0.3s; }
        .back-btn { background: #eff6ff; color: #1d4ed8; }
        .back-btn:hover { background: #dbeafe; }
        .wiki-btn { background: #3b82f6; color: white; }
        .wiki-btn:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59,130,246,0.4); }

        @media (max-width: 768px) {
            .navbar { padding: 15px; justify-content: center; }
            .detail-container { margin: 100px 15px 30px 15px; }
            .hero-banner { height: 250px; }
            .content-body { padding: 30px 20px; }
            .place-title { font-size: 2rem; }
            .btn-group { flex-direction: column; width: 100%; }
            .back-btn, .wiki-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="javascript:history.back()" class="logo">
            <i class="fas fa-arrow-left" style="font-size: 1.2rem;"></i> Back to City
        </a>
        <div class="logo">
            <i class="fas fa-globe-americas" style="color: #3b82f6;"></i>
            <span>Terra<span style="color: #3b82f6;">Vista</span></span>
        </div>
    </nav>

    <div class="detail-container">
        <div class="hero-banner" id="heroBanner">
            <div class="loader" id="imgLoader"><i class="fas fa-image fa-spin fa-2x"></i></div>
            <img id="placeImage" class="hero-img" alt="{{ place_name }}">
        </div>

        <div class="content-body">
            <h1 class="place-title">{{ place_name }}</h1>
            
            <div id="wikiData" class="wiki-content">
                <div style="text-align: center; color: #64748b;"><i class="fas fa-circle-notch fa-spin fa-2x"></i><br><br>Retrieving live data...</div>
            </div>

            <div class="btn-group" id="actionButtons">
                <a href="javascript:history.back()" class="back-btn">
                    <i class="fas fa-map-marked-alt"></i> Continue Exploring
                </a>
                </div>
        </div>
    </div>

    <script>
        const placeName = "{{ place_name }}";
        
        // STEP 1: Smart Search - Find the exact Wikipedia title instead of guessing
        // Appending " India" helps the search engine filter out places in other countries
        const searchQuery = encodeURIComponent(placeName + " India");
        const searchApiUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${searchQuery}&utf8=&format=json&origin=*`;

        fetch(searchApiUrl)
            .then(response => response.json())
            .then(searchData => {
                // Check if Wikipedia found any matching articles
                if (searchData.query.search.length > 0) {
                    const exactTitle = searchData.query.search[0].title;
                    
                    // STEP 2: Fetch the actual summary using the exact official title
                    const wikiSummaryUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(exactTitle)}`;
                    return fetch(wikiSummaryUrl);
                } else {
                    throw new Error("No Wikipedia results found.");
                }
            })
            .then(response => {
                if (!response || !response.ok) throw new Error("Wikipedia article not found.");
                return response.json();
            })
            .then(data => {
                // 1. Safe Image Loading
                const imgElement = document.getElementById('placeImage');
                
                imgElement.onload = function() {
                    document.getElementById('imgLoader').style.display = 'none';
                    this.classList.add('loaded');
                };

                imgElement.onerror = function() {
                    document.getElementById('imgLoader').innerHTML = '<i class="fas fa-image" style="font-size: 3rem; color: #94a3b8;"></i><p style="margin-top: 10px; color: #64748b;">Image Unavailable</p>';
                    this.style.display = 'none';
                };

                // Prioritize high-res original image, fallback to thumbnail upscaling
                if(data.originalimage && data.originalimage.source) {
                    imgElement.src = data.originalimage.source;
                } else if(data.thumbnail && data.thumbnail.source) {
                    imgElement.src = data.thumbnail.source.replace(/\d+px-/, '800px-'); 
                } else {
                    imgElement.onerror(); 
                }

                // 2. Safe Text Loading & Action Button
                if(data.extract_html) {
                    document.getElementById('wikiData').innerHTML = data.extract_html;
                    
                    if(data.content_urls && data.content_urls.desktop) {
                        const wikiBtn = document.createElement('a');
                        wikiBtn.href = data.content_urls.desktop.page;
                        wikiBtn.target = "_blank";
                        wikiBtn.className = "wiki-btn";
                        wikiBtn.innerHTML = '<i class="fab fa-wikipedia-w"></i> Read Full Article';
                        document.getElementById('actionButtons').appendChild(wikiBtn);
                    }
                } else {
                    throw new Error("No extract available.");
                }
            })
            .catch(error => {
                console.error("Wikipedia fetch error:", error);
                document.getElementById('wikiData').innerHTML = `<p>Experience the beauty of <strong>${placeName}</strong>, one of TerraVista's top curated spots.</p>`;
                document.getElementById('imgLoader').innerHTML = '<i class="fas fa-monument" style="font-size: 4rem; color: #cbd5e1;"></i>';
            });
    </script>

</body>
</html>
